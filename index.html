<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IK ML Course Mapper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #0F172A;
      background: #F1F5F9;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    header { margin-bottom: 28px; }
    header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: -0.01em;
    }
    header .subtitle {
      font-size: 13px;
      color: #64748B;
      margin-top: 4px;
    }
    header .badge {
      display: inline-block;
      padding: 2px 8px;
      background: #DCFCE7;
      color: #166534;
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card {
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .step { margin-bottom: 24px; }
    .step:last-child { margin-bottom: 0; }
    .step-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .step h3 {
      font-size: 15px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 12px;
    }

    .options {
      display: grid;
      gap: 8px;
    }
    .options.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .options.cols-2 { grid-template-columns: 1fr 1fr; }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
      background: #F8FAFC;
      border: 1.5px solid #E2E8F0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.12s;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      text-align: left;
      width: 100%;
    }
    .opt:hover {
      background: #F1F5F9;
      border-color: #94A3B8;
    }
    .opt.selected {
      background: #0F172A;
      color: #FFFFFF;
      border-color: #0F172A;
    }
    .opt .hint {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 2px;
    }

    .result {
      display: none;
      text-align: center;
      padding: 32px 24px;
    }
    .result.visible { display: block; }
    .result-badge {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }
    .result-badge.both { background: #C7D2FE; color: #312E81; }
    .result-badge.advanced { background: #A7F3D0; color: #064E3B; }
    .result-badge.flagship { background: #D1FAE5; color: #064E3B; }
    .result-badge.misfit { background: #FEE2E2; color: #991B1B; }
    .result-reason {
      font-size: 14px;
      color: #475569;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .btn-reset {
      padding: 10px 20px;
      background: #FFFFFF;
      color: #0F172A;
      border: 1.5px solid #CBD5E1;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .btn-reset:hover {
      background: #F1F5F9;
      border-color: #64748B;
    }

    .hidden { display: none; }

    footer {
      margin-top: 32px;
      padding-top: 18px;
      border-top: 1px solid #E2E8F0;
      font-size: 11px;
      color: #94A3B8;
      text-align: center;
    }

    @media (max-width: 600px) {
      .options.cols-4 { grid-template-columns: repeat(2, 1fr); }
      .options.cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>IK ML Course Mapper <span class="badge">Sales Tool</span></h1>
      <p class="subtitle">Answer a few questions about the lead to find the right ML program recommendation.</p>
    </header>

    <div class="card" id="form-card">
      <!-- Step 1: Years -->
      <div class="step" id="step-years">
        <span class="step-label">Step 1</span>
        <h3>Total years of professional experience</h3>
        <div class="options cols-4" id="years-options">
          <button class="opt" data-value="0-7">0–7 yrs</button>
          <button class="opt" data-value="8-15">8–15 yrs</button>
          <button class="opt" data-value="15-20">15–20 yrs</button>
          <button class="opt" data-value="20+">&gt; 20 yrs</button>
        </div>
      </div>

      <!-- Step 2: dynamic -->
      <div class="step hidden" id="step-coding">
        <span class="step-label">Step 2</span>
        <h3 id="coding-title"></h3>
        <div class="options cols-2" id="coding-options"></div>
      </div>

      <!-- Step 3: dynamic -->
      <div class="step hidden" id="step-3">
        <span class="step-label">Step 3</span>
        <h3 id="step3-title"></h3>
        <div class="options cols-2" id="step3-options"></div>
      </div>
    </div>

    <!-- Result -->
    <div class="card result" id="result-card">
      <div class="result-badge" id="result-badge"></div>
      <p class="result-reason" id="result-reason"></p>
      <button class="btn-reset" id="reset-btn">Start Over</button>
    </div>

    <footer>IK ML Course Mapper &middot; Internal Interview Kickstart tool</footer>
  </div>

  <script>
    const state = {};

    const $ = id => document.getElementById(id);

    function selectInGroup(container, btn) {
      container.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function hideStep(id) { $(id).classList.add('hidden'); }
    function showStep(id) { $(id).classList.remove('hidden'); }
    function clearStep(id) {
      $(id).classList.add('hidden');
      const opts = $(id).querySelector('.options');
      if (opts) opts.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
    }

    function showResult(outcome, reason) {
      const badge = $('result-badge');
      badge.className = 'result-badge';
      const labels = {
        BOTH: ['both', 'BOTH ADVANCED & FLAGSHIP ML'],
        ADVANCED: ['advanced', 'ADVANCED ML'],
        FLAGSHIP: ['flagship', 'FLAGSHIP ML'],
        MISFIT: ['misfit', 'MISFIT — not a fit']
      };
      const [cls, text] = labels[outcome];
      badge.classList.add(cls);
      badge.textContent = text;
      $('result-reason').textContent = reason;
      $('result-card').classList.add('visible');
      $('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function hideResult() {
      $('result-card').classList.remove('visible');
    }

    // Step 1: Years
    $('years-options').addEventListener('click', e => {
      const btn = e.target.closest('.opt');
      if (!btn) return;
      selectInGroup($('years-options'), btn);
      state.years = btn.dataset.value;
      delete state.coding;
      delete state.step3;
      clearStep('step-coding');
      clearStep('step-3');
      hideResult();

      if (state.years === '20+') {
        showResult('MISFIT', 'More than 20 years of experience — not a fit for either ML program regardless of profile.');
        return;
      }

      if (state.years === '0-7') {
        $('coding-title').textContent = 'Are they an active coder?';
        $('coding-options').innerHTML = `
          <button class="opt" data-value="active"><strong>Yes — actively coding</strong><span class="hint">Codes in their current role (SWE, Data Eng, etc.)</span></button>
          <button class="opt" data-value="inactive"><strong>No — not currently coding</strong><span class="hint">Doesn't write code in their current role</span></button>
        `;
        showStep('step-coding');
      }

      if (state.years === '8-15' || state.years === '15-20') {
        $('coding-title').textContent = 'Active coder, OR coded actively within the last 5 years?';
        $('coding-options').innerHTML = `
          <button class="opt" data-value="recent"><strong>Yes</strong><span class="hint">Active coder OR non-active coder (TPM, EM) who coded hands-on within last 5 yrs</span></button>
          <button class="opt" data-value="none"><strong>No</strong><span class="hint">Last coded > 5 yrs ago, or never coded professionally</span></button>
        `;
        showStep('step-coding');
      }
    });

    // Step 2: Coding
    $('coding-options').addEventListener('click', e => {
      const btn = e.target.closest('.opt');
      if (!btn) return;
      selectInGroup($('coding-options'), btn);
      state.coding = btn.dataset.value;
      delete state.step3;
      clearStep('step-3');
      hideResult();

      // 0-7 years
      if (state.years === '0-7') {
        if (state.coding === 'active') {
          showResult('BOTH', 'Active coder with 0–7 years — strong fit for both Advanced ML and Flagship ML.');
          return;
        }
        // inactive — ask STEM
        $('step3-title').textContent = 'Did they graduate in a STEM field?';
        $('step3-options').innerHTML = `
          <button class="opt" data-value="stem"><strong>Yes — STEM degree</strong><span class="hint">CS, Statistics, Math, Engineering, Physics, related</span></button>
          <button class="opt" data-value="non-stem"><strong>No — Non-STEM degree</strong><span class="hint">Humanities, business, arts, social sciences</span></button>
        `;
        showStep('step-3');
        return;
      }

      // 8-15 years
      if (state.years === '8-15') {
        if (state.coding === 'none') {
          showResult('MISFIT', 'Non-coder with no coding history, or last coded more than 5 years ago, or non-STEM / non-tech background — not a fit.');
          return;
        }
        // recent coding — ask direction
        $('step3-title').textContent = "What's their target direction?";
        $('step3-options').innerHTML = `
          <button class="opt" data-value="management"><strong>Management / Leadership</strong><span class="hint">Aiming to manage an AI/ML team</span></button>
          <button class="opt" data-value="research"><strong>Research-oriented role</strong><span class="hint">e.g., Research Analyst</span></button>
        `;
        showStep('step-3');
        return;
      }

      // 15-20 years
      if (state.years === '15-20') {
        if (state.coding === 'none') {
          showResult('MISFIT', 'Non-coder with no coding history, or last coded more than 5 years ago, or non-STEM / non-tech background — not a fit.');
          return;
        }
        // recent coding — only management is a fit at this band
        showResult('FLAGSHIP', 'Active coder or coded within last 5 years, aiming to manage an AI/ML team — Flagship ML is the fit.');
        return;
      }
    });

    // Step 3
    $('step3-options').addEventListener('click', e => {
      const btn = e.target.closest('.opt');
      if (!btn) return;
      selectInGroup($('step3-options'), btn);
      state.step3 = btn.dataset.value;
      hideResult();

      // 0-7 + inactive + STEM/non-STEM
      if (state.years === '0-7') {
        if (state.step3 === 'stem') {
          showResult('FLAGSHIP', 'Non-coder / non-tech + STEM graduate — Flagship ML is the fit.');
        } else {
          showResult('MISFIT', 'Non-STEM graduate — not a fit for either ML program.');
        }
        return;
      }

      // 8-15 + recent coding + direction
      if (state.years === '8-15') {
        if (state.step3 === 'management') {
          showResult('FLAGSHIP', 'Active coder or coded within last 5 years, aiming to manage an AI/ML team — Flagship ML is the fit.');
        } else {
          showResult('ADVANCED', 'Active coder or coded within last 5 years, aiming for a research-oriented role — Advanced ML is the fit.');
        }
        return;
      }
    });

    // Reset
    $('reset-btn').addEventListener('click', () => {
      Object.keys(state).forEach(k => delete state[k]);
      $('years-options').querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      clearStep('step-coding');
      clearStep('step-3');
      hideResult();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
